services:
  hello-api:
    image: ghcr.io/deejay-17/hello-api:3b5d9e7
    container_name: hello-api
    restart: unless-stopped

    networks:
      - proxy

    labels:
      - traefik.enable=true
      - traefik.http.routers.hello.rule=Host(`hello.depbox.dpdns.org`)
      - traefik.http.routers.hello.entrypoints=web
      - traefik.http.services.hello.loadbalancer.server.port=8000

networks:
  proxy:
    external: true