name: Deploy

on:

  workflow_run:

    workflows:
      - Build and Publish

    types:
      - completed

jobs:

  deploy:

    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    runs-on:
      - self-hosted
      - deploy

    steps:

      - name: Deploy
        run: |
          /home/deploy/scripts/deploy-hello.sh